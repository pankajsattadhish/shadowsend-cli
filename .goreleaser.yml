version: 2
project_name: shadowsend
builds:
  - main: .
    binary: shadowsend
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/pankajsattadhish/shadowsend-cli/cmd.version={{.Version}}
dockers:
  - image_templates:
      - "pankajsattadhish/shadowsend:{{ .Version }}"
      - "pankajsattadhish/shadowsend:latest"
    dockerfile: Dockerfile
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
archives:
  - format: tar.gz
    name_template: "shadowsend_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
checksum:
  name_template: "checksums.txt"
changelog:
  sort: asc
release:
  github:
    owner: pankajsattadhish
    name: shadowsend-cli
